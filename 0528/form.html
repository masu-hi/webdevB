<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formの基本</title>
</head>

<body>
    <form action="/my-handling-form-page" method="post">
        <!-- action属性：送り先 -->
        <!-- method属性：送り方（getとpost）/get : URLのパラメータで送る post : 秘匿して送る -->
        <!-- 基本は、form要素の中野に入っていないとデータとして送ることができない -->
        <div>
            <!-- pは、ブロック要素なので、縦に並ぶ -->
            <!-- ラベルを付ける。labelのforとinputのidで紐づける -->
            <!-- labelは、inline要素なので、横に並ぶ -->
            <label for="name">Name:</label>
            <!-- input要素はデータフィールドで、type属性でデータの種類を分類する。 -->
            <!-- text,number,date,email,telなどなど -->
            <!-- idは、hrmlのルール：同一html内に1つしかない（ユニーク） -->
            <!-- nameは、PHPとか受け取る側がデータを判定する属性、複数可 -->
            <!-- inputは、inline要素なので、横に並ぶ -->
            <input type="text" id="name" name="user_name" />
        </div>
        <div>
            <label for="mail">Email:</label>
            <input type="email" id="mail" name="user_email" />
        </div>
        <div>
            <label for="msg">Message:</label>
            <!-- textareaは、改行のある段落を入力するためのテキストエリアです。 -->
            <textarea id="msg" name="user_message"></textarea>
        </div>
        <!-- データを送信するボタンの種類は３つ -->
        <input type="submit" value="送信">
        <button type="submit">送信</button>
        <!-- type=imageも送信ボタンです -->
        <input type="image" src="画像パス" alt="送信ボタン">
    </form>
    <!-- formの外 -->
    <button>今日の昼食</button>
</body>

</html>
